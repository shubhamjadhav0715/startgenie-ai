services:
  - type: web
    name: startgenie-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_BLUEPRINT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: BLUEPRINT_GENERATE_VISUAL
        value: "true"
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "true"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: startgenieai@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: startgenieai@gmail.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RAG_CHAT_TOP_K
        value: "4"
      - key: RAG_MIN_SCORE
        value: "0.2"
